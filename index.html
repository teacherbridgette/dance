<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DANCE PARTY!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-yellow: #f0ff00;
            --hot-pink: #ff007f;
            --electric-blue: #00e5ff;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Background Video */
        #bg-video-main {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* The 20% transparent gap at the top */
        .spacer-top {
            height: 20vh; 
            width: 100%;
        }

        /* The 80% Game Area anchored to the bottom */
        .game-area-bottom {
            height: 80vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* Pushes content to the very bottom */
            padding-bottom: 20px; /* Tiny cushion for the button */
            box-sizing: border-box;
        }

        /* GIANT Grid */
        #game-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            padding: 0 10px;
            z-index: 1;
        }

        .box {
            width: 350px; /* Massive boxes */
            height: 350px;
            border: 6px solid rgba(0, 229, 255, 0.4);
            border-radius: 45px;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-image: url('box-design.png');
            background-color: rgba(0,0,0,0.5);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
            animation: borderPulse 3s infinite alternate;
            transition: all 0.1s ease;
        }

        @keyframes borderPulse {
            from { border-color: var(--electric-blue); box-shadow: 0 0 20px var(--electric-blue); }
            to { border-color: var(--hot-pink); box-shadow: 0 0 40px var(--hot-pink); }
        }

        .box.shimmer {
            border-color: var(--neon-yellow) !important;
            box-shadow: 0 0 100px var(--neon-yellow) !important;
            transform: scale(1.1);
            filter: brightness(1.8);
            z-index: 10;
            animation: none;
        }

        /* Large Start Button */
        #start-btn {
            margin-top: 20px;
            padding: 25px 140px;
            font-size: 4.5rem;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(45deg, var(--hot-pink), var(--electric-blue));
            color: white;
            border: none;
            border-radius: 100px;
            box-shadow: 0 0 50px var(--hot-pink);
            z-index: 10;
        }

        /* Fullscreen Video Overlay */
        #video-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 100;
        }

        #video-blur-bg {
            position: absolute;
            width: 120%; height: 120%;
            top: -10%; left: -10%;
            object-fit: cover;
            filter: blur(40px) brightness(0.4);
            z-index: 101;
        }

        #game-video {
            position: relative;
            width: 100%; height: 100%;
            object-fit: contain;
            z-index: 102;
        }

        #fullscreen-btn {
            position: fixed;
            top: 20px; right: 20px;
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center; justify-content: center;
            z-index: 50;
            backdrop-filter: blur(10px);
            border: 2px solid var(--electric-blue);
        }
    </style>
</head>
<body>

    <video id="bg-video-main" autoplay muted loop playsinline>
        <source src="background-loop.mp4" type="video/mp4">
    </video>

    <div id="fullscreen-btn" onclick="toggleFullScreen()">
        <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
        </svg>
    </div>

    <div class="spacer-top"></div>

    <div class="game-area-bottom">
        <div id="game-grid">
            <div class="box" id="box-0"></div>
            <div class="box" id="box-1"></div>
            <div class="box" id="box-2"></div>
            <div class="box" id="box-3"></div>
            <div class="box" id="box-4"></div>
            <div class="box" id="box-5"></div>
            <div class="box" id="box-6"></div>
            <div class="box" id="box-7"></div>
            <div class="box" id="box-8"></div>
            <div class="box" id="box-9"></div>
        </div>
        <button id="start-btn" onclick="runSelectionCycle()">DANCE!</button>
    </div>

    <div id="video-overlay">
        <video id="video-blur-bg" muted playsinline></video>
        <video id="game-video" playsinline></video>
    </div>

    <audio id="sfx-shimmer" src="shimmer.mp3" loop></audio>
    <audio id="sfx-stop" src="reveal.mp3"></audio>

    <script>
        const danceVideos = ["dance1.mp4", "dance2.mp4", "dance3.mp4", "dance4.mp4", "dance5.mp4", "dance6.mp4", "dance7.mp4", "dance8.mp4", "dance9.mp4", "dance10.mp4"];
        const goodJobVideo = "good-job.mp4";

        const boxes = document.querySelectorAll('.box');
        const overlay = document.getElementById('video-overlay');
        const videoPlayer = document.getElementById('game-video');
        const blurPlayer = document.getElementById('video-blur-bg');
        const startBtn = document.getElementById('start-btn');
        const sfxShimmer = document.getElementById('sfx-shimmer');
        const sfxStop = document.getElementById('sfx-stop');

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {});
            } else {
                document.exitFullscreen();
            }
        }

        function runSelectionCycle() {
            startBtn.style.visibility = 'hidden';
            let count = 0;
            let duration = 15 + Math.floor(Math.random() * 10);
            sfxShimmer.play();
            const interval = setInterval(() => {
                boxes.forEach(b => b.classList.remove('shimmer'));
                boxes[count % 10].classList.add('shimmer');
                count++;
                if (count > duration) {
                    clearInterval(interval);
                    sfxShimmer.pause();
                    sfxShimmer.currentTime = 0;
                    playSequence(count % 10);
                }
            }, 130);
        }

        function playSequence(index) {
            sfxStop.play();
            setTimeout(() => {
                overlay.style.display = 'block';
                startVideo(danceVideos[index]);
                videoPlayer.onended = () => {
                    if(videoPlayer.getAttribute('src') !== goodJobVideo) {
                        startVideo(goodJobVideo);
                    } else {
                        overlay.style.display = 'none';
                        startBtn.style.visibility = 'visible';
                        boxes.forEach(b => b.classList.remove('shimmer'));
                        blurPlayer.pause();
                    }
                };
            }, 600);
        }

        function startVideo(src) {
            videoPlayer.src = src;
            blurPlayer.src = src;
            videoPlayer.play();
            blurPlayer.play();
        }
    </script>
</body>
</html>
