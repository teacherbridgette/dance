<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DANCE PARTY!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-yellow: #f0ff00;
            --hot-pink: #ff007f;
            --electric-blue: #00e5ff;
            --game-scale: 25vh; 
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* iPad Fix: Start Overlay */
        #ipad-unlock {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--hot-pink);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #ipad-unlock button {
            padding: 30px 60px;
            font-size: 3rem;
            font-family: 'Fredoka', sans-serif;
            border-radius: 50px;
            border: none;
            background: white;
            color: var(--hot-pink);
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #bg-video-main {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .banner-space { height: 30vh; width: 100%; }

        .game-area-bottom {
            height: 70vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5vh;
            z-index: 1;
        }

        .box {
            width: var(--game-scale); 
            height: var(--game-scale);
            border: 0.6vh solid rgba(0, 229, 255, 0.4);
            border-radius: 4vh;
            background-size: cover;
            background-position: center;
            background-image: url('box-design.png');
            background-color: rgba(0,0,0,0.5);
            animation: borderPulse 3s infinite alternate;
        }

        @keyframes borderPulse {
            from { border-color: var(--electric-blue); box-shadow: 0 0 1vh var(--electric-blue); }
            to { border-color: var(--hot-pink); box-shadow: 0 0 3vh var(--hot-pink); }
        }

        .box.shimmer {
            border-color: var(--neon-yellow) !important;
            box-shadow: 0 0 10vh var(--neon-yellow) !important;
            transform: scale(1.1);
            filter: brightness(1.8);
            z-index: 10;
        }

        #start-btn {
            margin-top: 2vh;
            padding: 2vh 10vw;
            font-size: 5vh;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            background: linear-gradient(45deg, var(--hot-pink), var(--electric-blue));
            color: white;
            border: none;
            border-radius: 100px;
            box-shadow: 0 0 5vh var(--hot-pink);
        }

        #countdown-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 500;
            justify-content: center;
            align-items: center;
            font-size: 30vh;
            color: var(--neon-yellow);
        }

        #video-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 600;
        }

        #video-blur-bg {
            position: absolute;
            width: 120%; height: 120%;
            top: -10%; left: -10%;
            object-fit: cover;
            filter: blur(40px) brightness(0.4);
            z-index: 601;
        }

        #game-video {
            position: relative;
            width: 100%; height: 100%;
            object-fit: contain;
            z-index: 602;
        }
    </style>
</head>
<body>

    <div id="ipad-unlock">
        <h1>READY TO PARTY?</h1>
        <button onclick="unlockiPad()">START GAME</button>
        <p>Tap to enable sound and video</p>
    </div>

    <video id="bg-video-main" loop muted playsinline>
        <source src="background-loop.mp4" type="video/mp4">
    </video>

    <div class="banner-space"></div>

    <div class="game-area-bottom">
        <div id="game-grid">
            <div class="box" id="box-0"></div>
            <div class="box" id="box-1"></div>
            <div class="box" id="box-2"></div>
            <div class="box" id="box-3"></div>
            <div class="box" id="box-4"></div>
            <div class="box" id="box-5"></div>
            <div class="box" id="box-6"></div>
            <div class="box" id="box-7"></div>
            <div class="box" id="box-8"></div>
            <div class="box" id="box-9"></div>
        </div>
        <button id="start-btn" onclick="runSelectionCycle()">DANCE!</button>
    </div>

    <div id="countdown-overlay">READY?</div>

    <div id="video-overlay">
        <video id="video-blur-bg" muted playsinline></video>
        <video id="game-video" playsinline></video>
    </div>

    <audio id="sfx-shimmer" src="shimmer.mp3" loop></audio>
    <audio id="sfx-stop" src="reveal.mp3"></audio>

    <script>
        const danceVideos = ["dance1.mp4", "dance2.mp4", "dance3.mp4", "dance4.mp4", "dance5.mp4", "dance6.mp4", "dance7.mp4", "dance8.mp4", "dance9.mp4", "dance10.mp4"];
        const goodJobVideo = "good-job.mp4";
        
        const videoPlayer = document.getElementById('game-video');
        const blurPlayer = document.getElementById('video-blur-bg');
        const bgVideo = document.getElementById('bg-video-main');
        const sfxShimmer = document.getElementById('sfx-shimmer');
        const sfxStop = document.getElementById('sfx-stop');

        // This function is key for iPad. It "primes" all media on a single tap.
        function unlockiPad() {
            // Play and immediately pause/mute everything to satisfy Apple
            bgVideo.play();
            sfxShimmer.play(); sfxShimmer.pause();
            sfxStop.play(); sfxStop.pause();
            videoPlayer.load();
            blurPlayer.load();

            // Request Fullscreen for iPad
            let docEl = document.documentElement;
            let request = docEl.requestFullscreen || docEl.webkitRequestFullScreen;
            if(request) request.call(docEl);

            // Hide the unlock screen
            document.getElementById('ipad-unlock').style.display = 'none';
        }

        function runSelectionCycle() {
            document.getElementById('start-btn').style.visibility = 'hidden';
            let count = 0;
            let duration = 15 + Math.floor(Math.random() * 10);
            sfxShimmer.play();
            
            const interval = setInterval(() => {
                document.querySelectorAll('.box').forEach(b => b.classList.remove('shimmer'));
                document.getElementById('box-' + (count % 10)).classList.add('shimmer');
                count++;
                if (count > duration) {
                    clearInterval(interval);
                    sfxShimmer.pause(); sfxShimmer.currentTime = 0;
                    startCountdown(count % 10);
                }
            }, 130);
        }

        function startCountdown(idx) {
            sfxStop.play();
            const co = document.getElementById('countdown-overlay');
            co.style.display = 'flex';
            let t = 3;
            co.innerText = "READY?";
            const ci = setInterval(() => {
                if(t > 0) { co.innerText = t; t--; }
                else if(t === 0) { co.innerText = "GO!"; t--; }
                else { 
                    clearInterval(ci); 
                    co.style.display = 'none'; 
                    playSequence(idx); 
                }
            }, 800);
        }

        function playSequence(index) {
            document.getElementById('video-overlay').style.display = 'block';
            startVideo(danceVideos[index]);
            videoPlayer.onended = () => {
                if(videoPlayer.getAttribute('src') !== goodJobVideo) {
                    startVideo(goodJobVideo);
                } else {
                    document.getElementById('video-overlay').style.display = 'none';
                    document.getElementById('start-btn').style.visibility = 'visible';
                    document.querySelectorAll('.box').forEach(b => b.classList.remove('shimmer'));
                }
            };
        }

        function startVideo(src) {
            videoPlayer.src = src;
            blurPlayer.src = src;
            videoPlayer.play().catch(e => console.log("iPad Error: ", e));
            blurPlayer.play();
        }
    </script>
</body>
</html>
